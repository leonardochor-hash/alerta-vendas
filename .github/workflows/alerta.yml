name: Alerta Inatividade Vendas

on:
  schedule:
    # === MINUTO :00 ===
    # Seg a Sab: 10h-20h BRT = 13h-23h UTC (parte 1)
    - cron: "0 13-23 * * 1-6"
    # Seg a Sab: 21h e 22h BRT = 00h e 01h UTC (parte 2, dia seguinte)
    - cron: "0 0-1 * * 2-0"
    # Dom: 14h-21h BRT = 17h-23h UTC (parte 1)
    - cron: "0 17-23 * * 0"
    # Dom: 21h BRT = 00h UTC (segunda-feira UTC)
    - cron: "0 0 * * 1"

    # === MINUTO :45 ===
    # Seg a Sab: 10:45h-20:45h BRT = 13:45h-23:45h UTC
    - cron: "45 13-23 * * 1-6"
    # Seg a Sab: 21:45h BRT = 00:45h UTC (dia seguinte)
    - cron: "45 0 * * 2-0"
    # Dom: 14:45h-20:45h BRT = 17:45h-23:45h UTC
    - cron: "45 17-23 * * 0"
    # Dom: 21:45h BRT = 00:45h UTC (segunda-feira UTC) - aviso encerramento dom
    - cron: "45 0 * * 1"

  workflow_dispatch:
    inputs:
      hora_simulada:
        description: "Hora simulada BRT (ex: 18)"
        required: false
        default: ""
      data_simulada:
        description: "Data simulada (ex: 17/05/2026)"
        required: false
        default: ""
      min_simulada:
        description: "Minuto simulado (ex: 00)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  alertar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 pytz

      - name: Baixar contadores anteriores
        uses: actions/download-artifact@v4
        with:
          name: contadores
          path: .
        continue-on-error: true

      - name: Baixar historico anterior
        uses: actions/download-artifact@v4
        with:
          name: historico
          path: .
        continue-on-error: true

      - name: Executar alerta
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_DEST: ${{ secrets.EMAIL_DEST }}
          CALLMEBOT_USER: ${{ secrets.CALLMEBOT_USER }}
          CALLMEBOT_KEY: ${{ secrets.CALLMEBOT_KEY }}
          HORA_SIMULADA: ${{ github.event.inputs.hora_simulada }}
          DATA_SIMULADA: ${{ github.event.inputs.data_simulada }}
          MIN_SIMULADA: ${{ github.event.inputs.min_simulada }}
        run: python alerta_vendas.py

      - name: Salvar contadores como artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contadores
          path: contadores.json
          overwrite: true

      - name: Salvar historico como artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: historico
          path: historico.json
          overwrite: true

      - name: Publicar historico.json no repositorio
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add -f historico.json || true
          git diff --cached --quiet || git commit -m "chore: atualiza historico.json [skip ci]"
          git push origin main || true
