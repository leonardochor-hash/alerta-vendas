name: Alerta Inatividade Vendas

on:
  schedule:
    # OFICIAIS - minuto :00 (cobrem 11h-22h BRT seg-sab e 15h-21h BRT dom/feriado)
    # BRT = UTC-3, sem horario de verao em 2026.
    - cron: "0 13-23 * * *"
    - cron: "0 0-1 * * *"
    # PREVIAS - minuto :45
    - cron: "45 13-23 * * *"
    - cron: "45 0 * * *"

  workflow_dispatch:
    inputs:
      hora_simulada:
        description: "Hora simulada BRT (ex: 18)"
        required: false
        default: ""
      data_simulada:
        description: "Data simulada (ex: 17/05/2026)"
        required: false
        default: ""
      min_simulada:
        description: "Minuto simulado (00 ou 45)"
        required: false
        default: ""
      forcar_modo:
        description: "Forcar modo: oficial | previa | (vazio = auto pelo minuto)"
        required: false
        default: ""
      dry_run:
        description: "Dry-run: 1 = nao envia email, nao altera arquivos (apenas logs)"
        required: false
        default: "0"

permissions:
  contents: write

jobs:
  alertar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 pytz

      - name: Executar alerta
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_DEST: ${{ secrets.EMAIL_DEST }}
          MOOMBOX_PASSWORD: ${{ secrets.MOOMBOX_PASSWORD }}
          WHATSAPP_NUMERO: ${{ secrets.CALLMEBOT_USER }}
          WHATSAPP_APIKEY: ${{ secrets.CALLMEBOT_KEY }}
          HORA_SIMULADA: ${{ github.event.inputs.hora_simulada }}
          DATA_SIMULADA: ${{ github.event.inputs.data_simulada }}
          MIN_SIMULADA: ${{ github.event.inputs.min_simulada }}
          FORCAR_MODO: ${{ github.event.inputs.forcar_modo }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: python alerta_vendas.py

      - name: Publicar dados no repositorio
        if: ${{ always() && github.event.inputs.dry_run != '1' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add -f contadores.json historico.json config.json || true
          cp historico.json alerta-vendas2/historico.json 2>/dev/null || true
          git add -f alerta-vendas2/historico.json || true
          git diff --cached --quiet || git commit -m "chore: atualiza dados [skip ci]"
          git push origin main || true
