name: Alerta Inatividade Vendas

on:
  schedule:
    # Minuto :00 - horas 13-23 UTC (10h-20h BRT) todos os dias
    - cron: "0 13-23 * * *"
    # Minuto :00 - horas 0 e 1 UTC (21h e 22h BRT) todos os dias
    - cron: "0 0-1 * * *"
    # Minuto :45 - horas 13-23 UTC (10:45h-20:45h BRT) todos os dias
    - cron: "45 13-23 * * *"
    # Minuto :45 - hora 0 UTC (21:45h BRT) todos os dias
    - cron: "45 0 * * *"

  workflow_dispatch:
    inputs:
      hora_simulada:
        description: "Hora simulada BRT (ex: 18)"
        required: false
        default: ""
      data_simulada:
        description: "Data simulada (ex: 17/05/2026)"
        required: false
        default: ""
      min_simulada:
        description: "Minuto simulado (ex: 00)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  alertar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 pytz

      - name: Baixar contadores anteriores
        uses: actions/download-artifact@v4
        with:
          name: contadores
          path: .
        continue-on-error: true

      - name: Baixar historico anterior
        uses: actions/download-artifact@v4
        with:
          name: historico
          path: .
        continue-on-error: true

      - name: Executar alerta
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_DEST: ${{ secrets.EMAIL_DEST }}
          CALLMEBOT_USER: ${{ secrets.CALLMEBOT_USER }}
          CALLMEBOT_KEY: ${{ secrets.CALLMEBOT_KEY }}
          HORA_SIMULADA: ${{ github.event.inputs.hora_simulada }}
          DATA_SIMULADA: ${{ github.event.inputs.data_simulada }}
          MIN_SIMULADA: ${{ github.event.inputs.min_simulada }}
        run: python alerta_vendas.py

      - name: Salvar contadores como artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contadores
          path: contadores.json
          overwrite: true

      - name: Salvar historico como artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: historico
          path: historico.json
          overwrite: true

      - name: Publicar historico.json no repositorio
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add -f historico.json || true
          git diff --cached --quiet || git commit -m "chore: atualiza historico.json [skip ci]"
          git push origin main || true
